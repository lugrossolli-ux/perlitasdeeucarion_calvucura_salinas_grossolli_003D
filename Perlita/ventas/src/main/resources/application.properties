spring.application.name=ventas
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/db_ventas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.path=/api/v1/ventas/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
server.forward-headers-strategy=framework