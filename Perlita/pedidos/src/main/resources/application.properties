spring.application.name=orders-service
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/db_orders?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
springdoc.api-docs.path=/api/v1/pedidos/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# --- URLs de microservicios para WebClient ---
microservicio.productos.url=http://localhost:8082
microservicio.calendario.url=http://localhost:8090
server.forward-headers-strategy=framework