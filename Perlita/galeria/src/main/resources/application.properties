server.port=8088
spring.application.name=galeria

spring.datasource.url=jdbc:mysql://localhost:3306/db_galeria?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# --- Configuración de Swagger (OpenAPI) ---
springdoc.api-docs.path=/api/v1/galeria/v3/api-docs
springdoc.server-url=http://localhost:9090
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
server.forward-headers-strategy=framework