spring.application.name=service_calendario
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/db_calendario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

microservicio.productos.url=http://localhost:8082
microservicio.pedidos.url=http://localhost:8085

# Force Hibernate dialect to avoid incompatibility warnings with older MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true

# --- Swagger ---
springdoc.api-docs.path=/api/v1/calendario/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.mvc.cors.allowed-headers=*
server.forward-headers-strategy=framework